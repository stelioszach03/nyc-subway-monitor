worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # Cache configuration
    proxy_cache_path /var/cache/nginx/mta_feed_cache levels=1:2 keys_zone=MTA_CACHE:10m 
                    max_size=1g inactive=60m use_temp_path=off;
    
    # Log format for debugging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'cache:$upstream_cache_status';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    
    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Gzip settings
    gzip off;  # Don't compress binary protobuf data
    
    # Server configuration
    server {
        listen 80;
        server_name _;
        
        # Route for ACE feed
        location /gtfs-ace {
            proxy_pass https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs-ace;
            proxy_cache MTA_CACHE;
            proxy_cache_valid 200 5s;
            proxy_cache_lock on;
            proxy_cache_use_stale updating;
            proxy_cache_background_update on;
            proxy_connect_timeout 10s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
            
            # Headers for the origin server
            proxy_set_header User-Agent "NYC-Subway-Monitor/1.0";
            
            # Return headers about cache status
            add_header X-Cache-Status $upstream_cache_status;
            
            # Forward original content type
            proxy_pass_request_headers on;
        }
        
        # Route for BDFM feed
        location /gtfs-bdfm {
            proxy_pass https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs-bdfm;
            proxy_cache MTA_CACHE;
            proxy_cache_valid 200 5s;
            proxy_cache_lock on;
            proxy_cache_use_stale updating;
            proxy_cache_background_update on;
            proxy_connect_timeout 10s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
            
            proxy_set_header User-Agent "NYC-Subway-Monitor/1.0";
            add_header X-Cache-Status $upstream_cache_status;
            proxy_pass_request_headers on;
        }
        
        # Route for G train feed
        location /gtfs-g {
            proxy_pass https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs-g;
            proxy_cache MTA_CACHE;
            proxy_cache_valid 200 5s;
            proxy_cache_lock on;
            proxy_cache_use_stale updating;
            proxy_cache_background_update on;
            proxy_connect_timeout 10s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
            
            proxy_set_header User-Agent "NYC-Subway-Monitor/1.0";
            add_header X-Cache-Status $upstream_cache_status;
            proxy_pass_request_headers on;
        }
        
        # Route for JZ feed
        location /gtfs-jz {
            proxy_pass https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs-jz;
            proxy_cache MTA_CACHE;
            proxy_cache_valid 200 5s;
            proxy_cache_lock on;
            proxy_cache_use_stale updating;
            proxy_cache_background_update on;
            proxy_connect_timeout 10s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
            
            proxy_set_header User-Agent "NYC-Subway-Monitor/1.0";
            add_header X-Cache-Status $upstream_cache_status;
            proxy_pass_request_headers on;
        }
        
        # Route for L feed (refreshes less frequently)
        location /gtfs-l {
            proxy_pass https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs-l;
            proxy_cache MTA_CACHE;
            proxy_cache_valid 200 15s;  # L train updates less frequently
            proxy_cache_lock on;
            proxy_cache_use_stale updating;
            proxy_cache_background_update on;
            proxy_connect_timeout 10s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
            
            proxy_set_header User-Agent "NYC-Subway-Monitor/1.0";
            add_header X-Cache-Status $upstream_cache_status;
            proxy_pass_request_headers on;
        }
        
        # Route for NQRW feed
        location /gtfs-nqrw {
            proxy_pass https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs-nqrw;
            proxy_cache MTA_CACHE;
            proxy_cache_valid 200 5s;
            proxy_cache_lock on;
            proxy_cache_use_stale updating;
            proxy_cache_background_update on;
            proxy_connect_timeout 10s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
            
            proxy_set_header User-Agent "NYC-Subway-Monitor/1.0";
            add_header X-Cache-Status $upstream_cache_status;
            proxy_pass_request_headers on;
        }
        
        # Route for 1-7 trains
        location /gtfs-123456 {
            proxy_pass https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs;
            proxy_cache MTA_CACHE;
            proxy_cache_valid 200 5s;
            proxy_cache_lock on;
            proxy_cache_use_stale updating;
            proxy_cache_background_update on;
            proxy_connect_timeout 10s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
            
            proxy_set_header User-Agent "NYC-Subway-Monitor/1.0";
            add_header X-Cache-Status $upstream_cache_status;
            proxy_pass_request_headers on;
        }
        
        # Route for Staten Island Railway
        location /gtfs-si {
            proxy_pass https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs-si;
            proxy_cache MTA_CACHE;
            proxy_cache_valid 200 30s;  # SI train updates less frequently
            proxy_cache_lock on;
            proxy_cache_use_stale updating;
            proxy_cache_background_update on;
            proxy_connect_timeout 10s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
            
            proxy_set_header User-Agent "NYC-Subway-Monitor/1.0";
            add_header X-Cache-Status $upstream_cache_status;
            proxy_pass_request_headers on;
        }
        
        # Health check endpoint
        location /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
}