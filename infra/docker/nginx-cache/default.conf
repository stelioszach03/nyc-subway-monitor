server {
    listen 80;
    server_name _;

    # Αυτόματο health check - διορθωμένο
    location /health {
        default_type text/plain;
        add_header Content-Type text/plain;
        return 200 'OK';
    }

    # ACE Lines
    location /gtfs-ace {
        set $upstream_url "https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs-ace";
        proxy_pass $upstream_url;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_set_header Host api-endpoint.mta.info;

        proxy_cache MTA_CACHE;
        proxy_cache_valid 200 5s;
        proxy_cache_lock on;
        proxy_cache_use_stale updating;
        proxy_cache_background_update on;

        proxy_connect_timeout 10s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;

        proxy_set_header User-Agent "NYC-Subway-Monitor/1.0";
        add_header X-Cache-Status $upstream_cache_status;
        proxy_pass_request_headers on;
    }

