version: '3.8'

services:
  # Υποδομή
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q 'Mode'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    restart: unless-stopped
    networks:
      - subway-net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_LOG_RETENTION_HOURS=168
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms256m
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    networks:
      - subway-net

  # Βάσεις Δεδομένων
  timescaledb:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-subway}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-subway_password}
      - POSTGRES_DB=${POSTGRES_DB:-subway_monitor}
    command: postgres -c max_connections=200 -c shared_buffers=256MB
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-subway} -d ${POSTGRES_DB:-subway_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - subway-net

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - subway-net

  # Model Trainer Service - περιοδική εκπαίδευση
  trainer:
    build:
      context: ../../services/trainer
    environment:
      - POSTGRES_HOST=timescaledb
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-subway}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-subway_password}
      - POSTGRES_DB=${POSTGRES_DB:-subway_monitor}
      - MODEL_OUTPUT_PATH=/app/models/anomaly_model.onnx
      - ML_SERVICE_URL=http://ml:8000
      - TRAINING_SCHEDULE="0 */6 * * *"  # Εκπαίδευση κάθε 6 ώρες
    volumes:
      - ml_models:/app/models
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - subway-net

  # ML Service
  ml:
    build:
      context: ../../services/ml
    ports:
      - "8001:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MODEL_PATH=/app/models/anomaly_model.onnx
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AUTO_CREATE_MODEL=true
      - MODEL_RELOAD_INTERVAL=60  # Έλεγχος για νέο μοντέλο κάθε 60 δευτερόλεπτα
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ml_models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - subway-net

  # API Gateway
  api:
    build:
      context: ../../services/api
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=timescaledb
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-subway}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-subway_password}
      - POSTGRES_DB=${POSTGRES_DB:-subway_monitor}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ML_SERVICE_URL=http://ml:8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WORKERS=4
    depends_on:
      ml:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - subway-net

  # Web Frontend
  web:
    build:
      context: ../../web
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
        - VITE_MAPBOX_TOKEN=${MAPBOX_TOKEN}
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - subway-net

  # Ingest Service
  ingest:
    build:
      context: ../../services/ingest
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - POSTGRES_HOST=timescaledb
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-subway}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-subway_password}
      - POSTGRES_DB=${POSTGRES_DB:-subway_monitor}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./feeds.yaml:/app/feeds.yaml:ro
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - subway-net

  # Stream Service
  stream:
    build:
      context: ../../services/stream
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - POSTGRES_HOST=timescaledb
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-subway}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-subway_password}
      - POSTGRES_DB=${POSTGRES_DB:-subway_monitor}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - subway-net

  # Monitoring - προαιρετικά
  prometheus:
    image: prom/prometheus:v2.48.0
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    profiles: ["monitoring"]
    networks:
      - subway-net

  grafana:
    image: grafana/grafana:10.2.2
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    profiles: ["monitoring"]
    networks:
      - subway-net

networks:
  subway-net:
    driver: bridge

volumes:
  zookeeper_data:
  kafka_data:
  timescaledb_data:
  redis_data:
  ml_models:
  prometheus_data:
  grafana_data: