version: '3.8'

services:
  # Infrastructure
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q 'Mode'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    restart: unless-stopped
    networks:
      - subway-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_LOG_RETENTION_HOURS=168
      - KAFKA_HEAP_OPTS=-Xmx1g -Xms512m
      - KAFKA_JVM_PERFORMANCE_OPTS=-XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    networks:
      - subway-net
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '1.0'
        reservations:
          memory: 512M

  # Databases
  timescaledb:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-subway}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-subway_password}
      - POSTGRES_DB=${POSTGRES_DB:-subway_monitor}
    command: >
      postgres -c max_connections=200 
              -c shared_buffers=256MB
              -c work_mem=16MB
              -c maintenance_work_mem=64MB
              -c effective_cache_size=512MB
              -c checkpoint_timeout=15min
              -c max_wal_size=2GB
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-subway} -d ${POSTGRES_DB:-subway_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - subway-net
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    # Include Redis configuration for better performance
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - subway-net
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
        reservations:
          memory: 128M

  # Model Trainer Service - periodic training
  trainer:
    build:
      context: ../../services/trainer
      dockerfile: Dockerfile
    environment:
      - POSTGRES_HOST=timescaledb
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-subway}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-subway_password}
      - POSTGRES_DB=${POSTGRES_DB:-subway_monitor}
      - MODEL_OUTPUT_PATH=/app/models/anomaly_model.onnx
      - ML_SERVICE_URL=http://ml:8000
      - TRAINING_SCHEDULE="0 */2 * * *"  # Training every 2 hours for more frequent updates
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ml_models:/app/models
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - subway-net
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
        reservations:
          memory: 256M

  # ML Service
  ml:
    build:
      context: ../../services/ml
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MODEL_PATH=/app/models/anomaly_model.onnx
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AUTO_CREATE_MODEL=true
      - MODEL_RELOAD_INTERVAL=30  # Check for new model every 30 seconds
      - WORKERS=2
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ml_models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - subway-net
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
        reservations:
          memory: 256M

  # API Gateway
  api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=timescaledb
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-subway}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-subway_password}
      - POSTGRES_DB=${POSTGRES_DB:-subway_monitor}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ML_SERVICE_URL=http://ml:8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WORKERS=4
      - PYTHONUNBUFFERED=1
    depends_on:
      ml:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - subway-net
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
        reservations:
          memory: 256M

  # Web Frontend
  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
        - VITE_MAPBOX_TOKEN=${MAPBOX_TOKEN}
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - subway-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M

  # Ingest Service
  ingest:
    build:
      context: ../../services/ingest
      dockerfile: Dockerfile
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - POSTGRES_HOST=timescaledb
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-subway}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-subway_password}
      - POSTGRES_DB=${POSTGRES_DB:-subway_monitor}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./feeds.yaml:/app/feeds.yaml:ro
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - subway-net
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.8'
        reservations:
          memory: 256M

  # Stream Service
  stream:
    build:
      context: ../../services/stream
      dockerfile: Dockerfile
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - POSTGRES_HOST=timescaledb
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-subway}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-subway_password}
      - POSTGRES_DB=${POSTGRES_DB:-subway_monitor}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - SPARK_WORKER_MEMORY=2g
      - SPARK_DRIVER_MEMORY=1g
      - SPARK_EXECUTOR_MEMORY=1g
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - subway-net
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: '1.5'
        reservations:
          memory: 512M

networks:
  subway-net:
    driver: bridge

volumes:
  zookeeper_data:
  kafka_data:
  timescaledb_data:
  redis_data:
  ml_models: